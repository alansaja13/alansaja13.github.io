<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alan Saja</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1509;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 7px;
      height: 7px;
      background: #c9a84c;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, background 0.25s ease, opacity 0.25s ease;
      opacity: 0.75;
      mix-blend-mode: screen;
    }

    #cursor.sobre-objeto {
      width: 28px;
      height: 28px;
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.55);
      opacity: 1;
    }

    /* ── Canvas ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── Vignette ── */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, #050c04 100%);
    }

    /* ── Escena ── */
    #escena {
      position: fixed;
      inset: 0;
      z-index: 2;
    }

    /* ── Nombre ── */
    #nombre {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
      z-index: 4;
    }

    #nombre h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(72px, 13vw, 148px);
      font-weight: 300;
      color: #ddd8c6;
      line-height: 0.88;
      letter-spacing: -0.025em;
    }

    #nombre h1 .italic {
      font-style: italic;
      color: rgba(201, 168, 76, 0.75);
    }

    #nombre .sub {
      margin-top: 18px;
      font-size: 9.5px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.35);
    }

    /* ── Objetos interactivos ── */
    .obj {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: none;
      z-index: 3;
      color: #253d28;
      transition: color 0.5s ease, filter 0.5s ease;
      will-change: transform;
    }

    .obj:hover {
      color: rgba(201, 168, 76, 0.7);
      filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.2));
    }

    .obj svg { display: block; }

    /* ── Palabra flotante al click ── */
    #eco {
      position: fixed;
      pointer-events: none;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      letter-spacing: 0.12em;
      color: rgba(201, 168, 76, 0.85);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.35s ease, transform 1.2s ease;
      transform: translateY(0px);
      white-space: nowrap;
    }

    /* ── Esquinas ── */
    .corner {
      position: fixed;
      z-index: 5;
      font-size: 9.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #304e34;
      pointer-events: none;
    }

    #c-bl { bottom: 32px; left: 40px; }
    #c-br {
      bottom: 32px;
      right: 40px;
      pointer-events: all;
    }

    #c-br a {
      text-decoration: none;
      color: #304e34;
      transition: color 0.3s;
      cursor: none;
    }

    #c-br a:hover { color: rgba(201, 168, 76, 0.7); }

    #c-tr {
      top: 32px;
      right: 40px;
      text-align: right;
      line-height: 1.8;
    }
  </style>
</head>

  <script>
    // ── Canvas de partículas ──
    const cv = document.getElementById('bg');
    const ctx = cv.getContext('2d');

    function resize() {
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
    }
    resize();
    // Segundo resize tras paint para asegurar dimensiones correctas
    requestAnimationFrame(resize);
    window.addEventListener('resize', resize);

    // Mouse suavizado
    const mouse  = { x: innerWidth / 2, y: innerHeight / 2 };
    const target = { x: mouse.x, y: mouse.y };

    window.addEventListener('mousemove', e => {
      target.x = e.clientX;
      target.y = e.clientY;
    });

    // Partículas
    const N = 95;
    const pts = Array.from({ length: N }, () => ({
      x:  Math.random() * innerWidth,
      y:  Math.random() * innerHeight,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r:  Math.random() * 1.6 + 0.5,
      op: Math.random() * 0.28 + 0.1,
    }));

    // ── Ondas al hacer click ──
    const waves = [];

    document.addEventListener('click', e => {
      // Solo si el click no fue en un objeto interactivo
      if (e.target.closest('.obj, #c-br')) return;
      waves.push({ x: e.clientX, y: e.clientY, r: 0, op: 0.5 });
    });

    // Las ondas se dibujan dentro del loop frame, antes del requestAnimationFrame
    // Inyectamos la lógica de ondas en el frame existente
    const _origFrame = frame;

    function drawWaves() {
      for (let i = waves.length - 1; i >= 0; i--) {
        const w = waves[i];
        w.r  += 4;
        w.op *= 0.93;

        // Empujar partículas cercanas al frente de onda
        for (const p of pts) {
          const dx = p.x - w.x;
          const dy = p.y - w.y;
          const d  = Math.hypot(dx, dy);
          const diff = Math.abs(d - w.r);
          if (diff < 30 && d > 0) {
            const f = ((30 - diff) / 30) * 1.2;
            p.vx += (dx / d) * f;
            p.vy += (dy / d) * f;
          }
        }

        if (w.op < 0.01) { waves.splice(i, 1); continue; }

        ctx.beginPath();
        ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(201, 168, 76, ${w.op * 0.35})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function frame() {
      mouse.x += (target.x - mouse.x) * 0.07;
      mouse.y += (target.y - mouse.y) * 0.07;

      ctx.clearRect(0, 0, cv.width, cv.height);

      for (const p of pts) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const d  = Math.sqrt(dx * dx + dy * dy);

        if (d < 160 && d > 0) {
          const f = ((160 - d) / 160) * 0.55;
          p.vx += (dx / d) * f;
          p.vy += (dy / d) * f;
        }

        p.vx *= 0.93;
        p.vy *= 0.93;
        p.x  += p.vx;
        p.y  += p.vy;

        if (p.x < 0)  p.x = cv.width;
        if (p.x > cv.width)  p.x = 0;
        if (p.y < 0)  p.y = cv.height;
        if (p.y > cv.height) p.y = 0;

        const blend = Math.max(0, 1 - d / 180);
        const rr = Math.round(130 + blend * 71);
        const gg = Math.round(180 - blend * 12);
        const bb = Math.round(110 - blend * 34);
        const op = p.op + blend * 0.18;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rr}, ${gg}, ${bb}, ${op})`;
        ctx.fill();
      }

      for (let i = 0; i < pts.length - 1; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          const d  = Math.sqrt(dx * dx + dy * dy);
          if (d < 110) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(130, 180, 110, ${0.07 * (1 - d / 110)})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }

      const sorted = pts
        .map(p => ({ p, d: Math.hypot(p.x - mouse.x, p.y - mouse.y) }))
        .sort((a, b) => a.d - b.d)
        .slice(0, 6);

      for (const { p, d } of sorted) {
        if (d > 220) break;
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(201, 168, 76, ${(1 - d / 220) * 0.22})`;
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }

      drawWaves();
      requestAnimationFrame(frame);
    }

    frame();

    // ── Cursor personalizado ──
    const cur = document.getElementById('cursor');

    window.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY  + 'px';
    });

    document.querySelectorAll('.obj, #c-br a').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('sobre-objeto'));
      el.addEventListener('mouseleave', () => cur.classList.remove('sobre-objeto'));
    });

    // ── Parallax de objetos ──
    const objEls = document.querySelectorAll('.obj');

    window.addEventListener('mousemove', e => {
      const ox = (e.clientX - innerWidth  / 2) / (innerWidth  / 2);
      const oy = (e.clientY - innerHeight / 2) / (innerHeight / 2);

      objEls.forEach(el => {
        const f  = parseFloat(el.dataset.p || 0.3);
        const tx = ox * f * 30;
        const ty = oy * f * 30;
        el.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
      });
    });

    // ── Click: palabra que flota y se desvanece ──
    const ecoEl = document.getElementById('eco');
    let ecoTimer;

    // SVG inline para el eco de la raíz
    const raizSVG = `<svg width="30" height="34" viewBox="0 0 28 32" fill="none"
      stroke="rgba(201,168,76,0.85)" stroke-width="1.2" stroke-linecap="round">
      <line x1="14" y1="2" x2="14" y2="13"/>
      <path d="M14 13 Q8 18 5 28"/>
      <path d="M14 13 Q20 18 23 28"/>
      <path d="M14 17 Q11 23 10 30"/>
      <path d="M14 20 Q17 25 18 30"/>
    </svg>`;

    objEls.forEach(el => {
      el.addEventListener('click', e => {
        const msg    = el.dataset.eco;
        const isSvg  = el.dataset.ecoSvg === 'raiz';
        if (!msg && !isSvg) return;

        clearTimeout(ecoTimer);

        // Reset
        ecoEl.style.transition = 'none';
        ecoEl.style.opacity    = '0';
        ecoEl.style.transform  = 'translateY(0px)';
        ecoEl.style.left = (e.clientX - 15) + 'px';
        ecoEl.style.top  = (e.clientY - 16) + 'px';

        if (isSvg) {
          ecoEl.innerHTML = raizSVG;
        } else {
          ecoEl.textContent = msg;
        }

        // Trigger
        ecoEl.getBoundingClientRect();
        ecoEl.style.transition = 'opacity 0.35s ease, transform 1.4s ease';
        ecoEl.style.opacity    = '1';
        ecoEl.style.transform  = 'translateY(-36px)';

        // Fade out
        ecoTimer = setTimeout(() => {
          ecoEl.style.opacity = '0';
        }, 1400);
      });
    });
  </script>
